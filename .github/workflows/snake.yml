name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Generate Snake
        uses: Platane/snk@v3
        with:
          github_user_name: Arunkoo
          outputs: |
            dist/snake.svg?snake_speed=1
            dist/snake-dark.svg?palette=github-dark&snake_speed=1&color_snake=#00ffcc
            dist/snake-rainbow.svg?palette=github-dark&snake_speed=1&color_snake=#ff00ff

      - name: Push Snake Animation
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
